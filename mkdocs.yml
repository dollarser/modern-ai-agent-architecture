site_name: 现代 AI Agent 架构：从原理到生产实践
site_description: 一本可持续维护、工程化、事实可验证的现代 AI Agent 技术参考书
site_author: AI Agent Architecture Project
site_url: https://blog.sunlingzhang.com/modern-ai-agent-architecture/
repo_name: dollarser/modern-ai-agent-architecture
repo_url: https://github.com/dollarser/modern-ai-agent-architecture
edit_uri: edit/main/
docs_dir: docs

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - toc.integrate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: zh
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dollarser/modern-ai-agent-architecture
  version:
    provider: mike

nav:
  - 首页: README.md
  - 前言: PREFACE.md
  - 目录: SUMMARY.md
  - 术语表: glossary/Glossary.md
  - FAQ 问题索引: faq/FAQ.md
  - 参考文献: references/References.md
  - 学习路线: roadmap/Roadmap.md
  - 第一部分 基础认知:
    - 第1章 AI Agent 简介与历史演进: chapters/01-introduction/README.md
    - 第2章 总体架构与生命周期: chapters/02-architecture/README.md
    - 第3章 Prompt 与 Instructions: chapters/03-prompt-instructions/README.md
    - 第4章 Context 管理: chapters/04-context-management/README.md
  - 第二部分 构建首个 Agent:
    - 第5章 Reasoning 与 Planning: chapters/05-reasoning-planning/README.md
    - 第6章 Tools 与 Function Calling: chapters/06-tools-function-calling/README.md
    - 第7章 Agent MVP：从零实现: chapters/07-agent-mvp/README.md
  - 第三部分 可靠运行:
    - 第8章 Memory：状态与记忆管理: chapters/08-memory/README.md
    - 第9章 Runtime：Agent 运行时: chapters/09-runtime/README.md
    - 第10章 Hooks：生命周期事件: chapters/10-hooks/README.md
    - 第11章 Tool Registry：工具注册与调度: chapters/11-tool-registry/README.md
  - 第四部分 扩展与互操作:
    - 第12章 Skills：可复用工作流: chapters/12-skills/README.md
    - 第13章 MCP：模型上下文协议: chapters/13-mcp/README.md
    - 第14章 Plugin 体系: chapters/14-plugin-system/README.md
  - 第五部分 规模化与生产:
    - 第15章 Agent 设计模式: chapters/15-design-patterns/README.md
    - 第16章 Agent Host 与场景组装: chapters/16-agent-host/README.md
    - 第17章 工程实践与生产部署: chapters/17-engineering-practice/README.md
    - 第18章 最佳实践、评估与反模式: chapters/18-best-practices/README.md
  - 第六部分 案例与索引:
    - 第19章 主流框架架构分析: chapters/19-framework-analysis/README.md
    - 第20章 常见架构问题与选型指南: chapters/20-faq/README.md
  - 附录:
    - 架构图索引: mermaid/ArchitectureIndex.md
    - Mermaid 图索引: mermaid/MermaidIndex.md
    - 代码示例索引: references/CodeExamples.md
  - 变更日志: CHANGELOG.md
  - 贡献指南: CONTRIBUTING.md
