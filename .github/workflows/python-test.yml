name: Python Test

on:
  push:
    paths:
      - 'examples/**/*.py'
      - 'examples/**/requirements.txt'
  pull_request:
    paths:
      - 'examples/**/*.py'
      - 'examples/**/requirements.txt'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Find and test all Python examples
        run: |
          for example_dir in examples/*/python/; do
            echo "=== Testing $example_dir ==="
            if [ -f "$example_dir/requirements.txt" ]; then
              pip install -r "$example_dir/requirements.txt"
            fi
            python -m compileall -q "$example_dir"
            found_test=false
            for test_file in "$example_dir"test_*.py; do
              if [ -f "$test_file" ]; then
                found_test=true
                python "$test_file"
              fi
            done
            # CLI 型 Installer/Manager 由测试覆盖，不能假定 main.py 支持无参数启动。
            if [ "$found_test" = false ] && [ -f "$example_dir/main.py" ]; then
              python "$example_dir/main.py"
            fi
          done

      - name: Verify all examples have README
        run: |
          for example_dir in examples/*/; do
            if [ ! -f "$example_dir/README.md" ]; then
              echo "ERROR: $example_dir is missing README.md"
              exit 1
            fi
          done
