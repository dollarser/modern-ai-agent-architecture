name: Mermaid Check

on:
  push:
    paths:
      - '**/*.md'
      - '**/*.mermaid'
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.mermaid'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install documentation tooling
        run: npm ci

      - name: Validate Mermaid diagrams
        run: npm run check:mermaid
