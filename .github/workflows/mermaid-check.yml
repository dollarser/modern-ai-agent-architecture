name: Mermaid Check

on:
  push:
    paths:
      - '**/*.md'
      - '**/*.mermaid'
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.mermaid'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid parser
        run: npm install --no-save --package-lock=false mermaid@11.16.0 jsdom@29.1.1

      - name: Extract Mermaid diagrams
        run: |
          python scripts/extract_mermaid.py . /tmp/mermaid-snippets

      - name: Validate Mermaid syntax
        run: node scripts/check_mermaid.mjs /tmp/mermaid-snippets
