name: Markdown Lint

on:
  push:
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Run markdownlint
        run: >-
          markdownlint README.md CONTRIBUTING.md
          'docs/**/*.md' 'specs/*.md' 'specs/book/*.md' 'reviews/README.md'
          --ignore 'LICENSE' --ignore 'docs/CHANGELOG.md'

      - name: Check Chinese-English spacing
        run: |
          # Check for missing spaces between Chinese and English characters
          ! grep -rPn '[\x{4e00}-\x{9fff}][A-Za-z]' docs/chapters/ || true
          ! grep -rPn '[A-Za-z][\x{4e00}-\x{9fff}]' docs/chapters/ || true
